<!DOCTYPE html>
<html>
<head>
    <title>Realtime Words</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: flex-end; }

        /* Menu */
        #menu { padding: 40px; }
        #menu button { background: #222; color: #fff; border: 1px solid #444; padding: 15px 30px; margin: 10px; cursor: pointer; font-size: 16px; }
        #menu button.selected { background: #4ade80; color: #000; border-color: #4ade80; }
        .source-select { margin-bottom: 30px; }
        .source-select span { margin-right: 15px; font-size: 14px; color: #888; }

        /* Mic selection */
        .mic-select-group { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 10px; }
        .mic-select-item { display: flex; flex-direction: column; gap: 5px; }
        .mic-select-item label { font-size: 12px; color: #666; }
        .mic-select-item select { background: #222; color: #fff; border: 1px solid #444; padding: 8px 12px; font-size: 13px; min-width: 180px; border-radius: 4px; }
        .mic-select-item select:focus { border-color: #4ade80; outline: none; }
        .mic-select-item .voice-input { background: #222; color: #fff; border: 1px solid #444; min-width: 200px; font-size: 11px; padding: 4px 8px; margin-top: 2px; border-radius: 4px; }
        .mic-select-item .voice-input:focus { border-color: #4ade80; outline: none; }
        .mic-select-item .voice-input::placeholder { color: #666; }
        .mic-select-row { display: flex; align-items: center; gap: 8px; }
        .mic-level { width: 60px; height: 8px; background: #222; border-radius: 4px; overflow: hidden; }
        .mic-level-bar { height: 100%; background: #4ade80; width: 0%; transition: width 0.05s; }

        /* Main layout */
        #main-content { display: none; width: 100%; padding: 20px; padding-bottom: 50px; padding-right: 320px; }

        /* Row-based layout: each option is a row with keyword + description */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .option-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .keyword-box {
            min-width: 120px;
            padding: 10px 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
        }
        .keyword-box:hover { background: #252525; }
        .keyword-box.active {
            background: #252525;
            border-color: #4ade80;
            color: #4ade80;
        }
        .desc-box {
            flex: 1;
            max-width: 500px;
            padding: 10px 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 14px;
            color: #ccc;
            line-height: 1.5;
            transition: all 0.2s;
        }
        .desc-box.active {
            background: #252525;
            border-color: #4ade80;
        }
        .desc-box strong { color: #fff; }
        .desc-box code { background: #222; padding: 2px 6px; border-radius: 4px; font-family: monospace; }


        /* Tap/Progress indicator (top of main-content) */
        .tap-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
            height: 24px;
        }
        .tap-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            opacity: 0;
        }
        .tap-dot.show {
            animation: dotPulse 0.5s ease-out;
        }
        @keyframes dotPulse {
            0% { opacity: 1; transform: scale(0.6); }
            30% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0; transform: scale(1); }
        }
        /* Loading indicator (left aligned) - LARGE and visible */
        .loading-indicator {
            display: none;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            justify-content: flex-start;
            padding: 16px 20px;
            background: rgba(74, 222, 128, 0.1);
            border: 2px solid #4ade80;
            border-radius: 12px;
            max-width: fit-content;
        }
        .loading-indicator.active {
            display: flex;
        }
        /* Summarizing state - different color */
        .loading-indicator.summarizing {
            background: rgba(251, 191, 36, 0.1);
            border-color: #fbbf24;
        }
        .loading-indicator.summarizing .loading-dots span {
            background: #fbbf24;
        }
        .loading-indicator.summarizing .label {
            color: #fbbf24;
        }
        /* Skipped state */
        .loading-indicator.skipped {
            background: rgba(156, 163, 175, 0.1);
            border-color: #6b7280;
        }
        .loading-indicator.skipped .loading-dots {
            display: none;
        }
        .loading-indicator.skipped .label {
            color: #9ca3af;
        }
        .loading-dots {
            display: flex;
            gap: 6px;
        }
        .loading-dots span {
            width: 12px;
            height: 12px;
            background: #4ade80;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }
        .loading-dots span:nth-child(1) { animation-delay: 0s; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        .loading-indicator .label {
            font-size: 18px;
            font-weight: 600;
            color: #4ade80;
            letter-spacing: 0.5px;
        }
        /* Dismiss indicator */
        .dismiss-indicator {
            display: none;
            font-size: 11px;
            color: #888;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .dismiss-indicator.show {
            display: block;
            opacity: 1;
        }
        .dismiss-indicator.fade-out {
            opacity: 0;
        }

        /* Optional summary text display during TTS playback */
        .summary-text {
            display: none;
            margin-bottom: 14px;
            max-width: 700px;
            padding: 10px 14px;
            border: 1px solid #334155;
            border-radius: 10px;
            background: rgba(148, 163, 184, 0.12);
            color: #e2e8f0;
            line-height: 1.45;
            font-size: 14px;
        }
        .summary-text.active {
            display: block;
        }

        /* Height position selector */
        .height-selector {
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }
        .height-slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            height: 150px;
        }
        .height-slider-track {
            width: 8px;
            height: 130px;
            background: #333;
            border-radius: 4px;
            position: relative;
            cursor: pointer;
        }
        .height-slider-thumb {
            width: 20px;
            height: 20px;
            background: #4ade80;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            cursor: grab;
            transition: background 0.2s;
        }
        .height-slider-thumb:hover {
            background: #22c55e;
        }
        .height-slider-thumb:active {
            cursor: grabbing;
        }
        .height-label {
            font-size: 12px;
            color: #888;
            min-width: 50px;
            margin-top: 60px;
        }
        /* Overview preview */
        .overview-preview {
            width: 80px;
            height: 130px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
        }
        .overview-screen-area {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .overview-widget {
            position: absolute;
            left: 5px;
            right: 5px;
            background: #1a1a1a;
            border: 1px solid #4ade80;
            border-radius: 3px;
            padding: 4px;
            transition: bottom 0.15s ease-out;
        }
        .overview-keyword {
            width: 25px;
            height: 6px;
            background: #4ade80;
            border-radius: 2px;
            margin-bottom: 3px;
        }
        .overview-desc {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 1px;
            margin-bottom: 2px;
        }
        .overview-desc:last-child {
            width: 60%;
            margin-bottom: 0;
        }

        /* Fullscreen overlay when adjusting height */
        .height-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 90;
        }
        .height-overlay.visible {
            opacity: 1;
        }

        /* Live preview widget on actual screen */
        .live-preview {
            position: fixed;
            left: 20px;
            right: 20px;
            bottom: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, bottom 0.05s linear;
            z-index: 100;
        }
        .live-preview.visible {
            opacity: 1;
        }

    </style>
</head>
<body>
    <div id="menu">
        <div class="source-select">
            <span>Source:</span>
            <button id="btn-mic" class="selected" onclick="setSource('mic')">🎤 Mic</button>
            <button id="btn-mp3" onclick="setSource('mp3')">🎵 MP3</button>
        </div>
        <div class="source-select" id="micSelectSection">
            <span>Mics:</span>
            <div class="mic-select-group">
                <div class="mic-select-item">
                    <label>Summary 1</label>
                    <div class="mic-select-row">
                        <select id="summaryMic1"></select>
                        <div class="mic-level"><div class="mic-level-bar" id="summaryMic1Level"></div></div>
                    </div>
                    <input type="text" id="voice1" class="voice-input" placeholder="Voice ID (empty = no TTS)" value="67192626-0be9-4f45-b660-580d318c994d">
                </div>
                <div class="mic-select-item">
                    <label>Summary 2</label>
                    <div class="mic-select-row">
                        <select id="summaryMic2"></select>
                        <div class="mic-level"><div class="mic-level-bar" id="summaryMic2Level"></div></div>
                    </div>
                    <input type="text" id="voice2" class="voice-input" placeholder="Voice ID (empty = no TTS)" value="a167e0f3-df7e-4d52-a9c3-f949145efdab">
                </div>
                <div class="mic-select-item">
                    <label>Keyword</label>
                    <div class="mic-select-row">
                        <select id="keywordMic"></select>
                        <div class="mic-level"><div class="mic-level-bar" id="keywordMicLevel"></div></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="source-select">
            <span>Dismiss:</span>
            <button id="btn-dismiss-summary" class="selected" onclick="setDismissMode('summary')">With Summary</button>
            <button id="btn-dismiss-none" onclick="setDismissMode('none')">No Summary</button>
        </div>
        <div class="source-select">
            <span>Summary Text:</span>
            <button id="btn-summary-text-on" class="selected" onclick="setSummaryTextMode(true)">Show</button>
            <button id="btn-summary-text-off" onclick="setSummaryTextMode(false)">Hide</button>
        </div>
        <div class="source-select height-selector">
            <span>Height:</span>
            <div class="height-slider-container">
                <div class="height-slider-track" id="heightTrack">
                    <div class="height-slider-thumb" id="heightThumb"></div>
                </div>
                <div class="overview-preview">
                    <div class="overview-screen-area">
                        <div class="overview-widget" id="overviewWidget">
                            <div class="overview-keyword"></div>
                            <div class="overview-desc"></div>
                            <div class="overview-desc"></div>
                        </div>
                    </div>
                </div>
            </div>
            <span class="height-label" id="heightLabel">Bottom</span>
        </div>

        <button onclick="start('all')">Start</button>
    </div>

    <!-- Fullscreen black overlay -->
    <div id="height-overlay" class="height-overlay"></div>

    <!-- Live preview widget (shown while adjusting height) -->
    <div id="live-preview" class="live-preview">
        <div class="option-row">
            <div class="keyword-box active">keyword</div>
            <div class="desc-box active">Description text will appear here...</div>
        </div>
    </div>

    <div id="main-content">
        <!-- Tap indicator -->
        <div class="tap-indicator" id="tapIndicator">
            <span class="tap-dot" id="tapDot1"></span>
            <span class="tap-dot" id="tapDot2"></span>
        </div>

        <!-- Loading indicator -->
        <div class="loading-indicator" id="loadingIndicator">
            <div class="loading-dots">
                <span></span><span></span><span></span>
            </div>
            <span class="label">Searching</span>
        </div>

        <!-- Dismiss indicator -->
        <div class="dismiss-indicator" id="dismissIndicator">Dismissed</div>
        <div class="summary-text" id="summaryText"></div>

        <div class="options-list" id="optionsList"></div>
    </div>

    <script>
        const socket = io();
        let view = 'single';
        let descView = 'single';
        let source = 'mic';
        let options = [];
        let currentIdx = 0;
        let summaryBuffer = '';
        let summaryTimer = null;
        let lastSpace = 0;
        let infoVisible = false;
        let dismissMode = 'summary'; // 'summary' or 'none'
        let summaryRequested = false; // Track if we actually requested a summary
        let summaryInProgress = false; // summarizing or tts playback in progress
        let showSummaryTextEnabled = true;
        let pendingSummaryText = '';
        let summaryFinalizeTimer = null;
        let awaitingJudgeDecision = false;
        let widgetHeight = 0; // 0 = bottom, 100 = top
        let isDragging = false;
        let availableDevices = [];
        const micSelectIds = ['summaryMic1', 'summaryMic2', 'keywordMic'];

        // Fetch and populate mic devices
        async function fetchDevices() {
            try {
                const resp = await fetch('/api/devices');
                availableDevices = await resp.json();
                populateMicSelects();
            } catch (e) {
                console.error('Failed to fetch devices:', e);
            }
        }

        function populateMicSelects() {
            micSelectIds.forEach((id, idx) => {
                const sel = document.getElementById(id);
                sel.innerHTML = '<option value="">Default</option>';
                availableDevices.forEach(d => {
                    sel.innerHTML += `<option value="${d.index}">[${d.index}] ${d.name}</option>`;
                });
                // Auto-select: keywordMic always uses Macbook mic
                if (id === 'keywordMic') {
                    const macbookMic = availableDevices.find(d => d.name.toLowerCase().includes('macbook'));
                    if (macbookMic) {
                        sel.value = macbookMic.index;
                    } else if (availableDevices.length > 0) {
                        sel.value = availableDevices[0].index;
                    }
                } else if (availableDevices.length > idx) {
                    sel.value = availableDevices[idx].index;
                }
                // Add change listener for mic level monitoring
                sel.addEventListener('change', updateMicMonitor);
            });
            // Start monitoring after all selects are populated
            updateMicMonitor();
        }

        function updateMicMonitor() {
            // Collect selected device indices and their select IDs
            const deviceIndices = [];
            const selectIds = [];
            micSelectIds.forEach(id => {
                const sel = document.getElementById(id);
                if (sel.value) {
                    deviceIndices.push(parseInt(sel.value));
                    selectIds.push(id);
                }
            });
            // Send to server to start PyAudio-based monitoring
            if (deviceIndices.length > 0) {
                socket.emit('start_mic_monitor', { device_indices: deviceIndices, select_ids: selectIds });
            } else {
                socket.emit('stop_mic_monitor');
            }
        }

        function stopAllMicMonitors() {
            socket.emit('stop_mic_monitor');
            // Reset all level bars
            micSelectIds.forEach(id => {
                const levelBar = document.getElementById(id + 'Level');
                if (levelBar) levelBar.style.width = '0%';
            });
        }

        // Receive mic levels from server (PyAudio-based)
        socket.on('mic_levels', data => {
            for (const [selectId, level] of Object.entries(data)) {
                const levelBar = document.getElementById(selectId + 'Level');
                if (levelBar) {
                    levelBar.style.width = level + '%';
                }
            }
        });

        function setSource(s) {
            source = s;
            document.getElementById('btn-mic').classList.toggle('selected', s === 'mic');
            document.getElementById('btn-mp3').classList.toggle('selected', s === 'mp3');
            // Show/hide mic selection
            document.getElementById('micSelectSection').style.display = s === 'mic' ? 'block' : 'none';
            if (s === 'mic' && availableDevices.length === 0) {
                fetchDevices();
            } else if (s === 'mp3') {
                stopAllMicMonitors();
            }
        }

        function setDismissMode(dm) {
            dismissMode = dm;
            document.getElementById('btn-dismiss-summary').classList.toggle('selected', dm === 'summary');
            document.getElementById('btn-dismiss-none').classList.toggle('selected', dm === 'none');
        }

        function setSummaryTextMode(enabled) {
            showSummaryTextEnabled = enabled;
            document.getElementById('btn-summary-text-on').classList.toggle('selected', enabled);
            document.getElementById('btn-summary-text-off').classList.toggle('selected', !enabled);
            if (!enabled) {
                hideSummaryText();
            } else if (summaryInProgress && pendingSummaryText) {
                showSummaryText(pendingSummaryText);
            }
        }

        function setDescView(dv) {
            descView = dv;
            document.getElementById('btn-desc-single').classList.toggle('selected', dv === 'single');
            document.getElementById('btn-desc-all').classList.toggle('selected', dv === 'all');
        }

        // Height slider functions
        function updateHeightSlider(value) {
            widgetHeight = Math.max(0, Math.min(100, value));
            const thumb = document.getElementById('heightThumb');
            const overviewWidget = document.getElementById('overviewWidget');
            const label = document.getElementById('heightLabel');
            const livePreview = document.getElementById('live-preview');

            // Thumb position: 0 at bottom (110px from top), 100 at top (0px from top)
            const thumbPos = 110 - (widgetHeight * 1.1);
            thumb.style.top = thumbPos + 'px';

            // Overview widget position (max bottom is ~100px to keep widget visible)
            const maxBottom = 100; // pixels from bottom in overview
            const overviewPos = (widgetHeight / 100) * maxBottom;
            overviewWidget.style.bottom = overviewPos + 'px';

            // Live preview position on actual screen
            const maxScreenBottom = window.innerHeight - 150; // Leave space for widget height
            const screenPos = 20 + (widgetHeight / 100) * maxScreenBottom;
            livePreview.style.bottom = screenPos + 'px';

            // Update label
            if (widgetHeight < 20) {
                label.textContent = 'Bottom';
            } else if (widgetHeight < 40) {
                label.textContent = 'Lower';
            } else if (widgetHeight < 60) {
                label.textContent = 'Middle';
            } else if (widgetHeight < 80) {
                label.textContent = 'Upper';
            } else {
                label.textContent = 'Top';
            }

            // Apply to main content
            applyWidgetHeight();
        }

        function showLivePreview() {
            document.getElementById('height-overlay').classList.add('visible');
            document.getElementById('live-preview').classList.add('visible');
        }

        function hideLivePreview() {
            document.getElementById('height-overlay').classList.remove('visible');
            document.getElementById('live-preview').classList.remove('visible');
        }

        function applyWidgetHeight() {
            const mainContent = document.getElementById('main-content');
            // Convert 0-100 to actual padding/margin
            // 0 = bottom (no margin), 100 = top (max margin from bottom)
            const maxOffset = window.innerHeight - 200; // Leave some space at top
            const offset = (widgetHeight / 100) * maxOffset;
            mainContent.style.marginBottom = offset + 'px';
        }

        function initHeightSlider() {
            const track = document.getElementById('heightTrack');
            const thumb = document.getElementById('heightThumb');

            function handleDrag(e) {
                if (!isDragging) return;
                e.preventDefault();

                const rect = track.getBoundingClientRect();
                const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                const relativeY = clientY - rect.top;
                const percentage = 100 - ((relativeY / rect.height) * 100);

                updateHeightSlider(percentage);
            }

            function startDrag(e) {
                isDragging = true;
                thumb.style.cursor = 'grabbing';
                showLivePreview();
                handleDrag(e);
            }

            function endDrag() {
                if (!isDragging) return;
                isDragging = false;
                thumb.style.cursor = 'grab';
                hideLivePreview();
            }

            // Mouse events
            thumb.addEventListener('mousedown', startDrag);
            track.addEventListener('mousedown', startDrag);
            document.addEventListener('mousemove', handleDrag);
            document.addEventListener('mouseup', endDrag);

            // Touch events
            thumb.addEventListener('touchstart', startDrag, { passive: false });
            track.addEventListener('touchstart', startDrag, { passive: false });
            document.addEventListener('touchmove', handleDrag, { passive: false });
            document.addEventListener('touchend', endDrag);

            // Initialize position
            updateHeightSlider(0);
        }

        // Initialize height slider on page load
        document.addEventListener('DOMContentLoaded', () => {
            initHeightSlider();
            // Fetch devices since default source is mic
            fetchDevices();
        });

        // Update on window resize
        window.addEventListener('resize', applyWidgetHeight);

        socket.on('keywords', data => {
            if (!Array.isArray(data) || data.length === 0) {
                return;
            }
            hideLoadingIndicator();
            hideSummary();
            // Append new keywords and keep last 3
            options = options.concat(data);
            const MAX_KEYWORDS = 3;
            if (options.length > MAX_KEYWORDS) {
                options = options.slice(-MAX_KEYWORDS);
            }
            // Focus on newest keyword
            currentIdx = options.length - 1;
            render();
            infoVisible = true;
        });
        socket.on('summary_chunk', data => {
            // Summary display removed
        });
        socket.on('clear', () => {
            // Don't clear keywords - keep last 3 visible
        });

        socket.on('session_ended', () => {
            options = [];
            currentIdx = 0;
            infoVisible = false;
            summaryRequested = false;
            summaryInProgress = false;
            pendingSummaryText = '';
            awaitingJudgeDecision = false;
            if (summaryFinalizeTimer) {
                clearTimeout(summaryFinalizeTimer);
                summaryFinalizeTimer = null;
            }
            document.getElementById('optionsList').innerHTML = '';
            hideLoadingIndicator();
            hideSummaryText();
        });

        socket.on('summary_done', data => {
            // Multi-summary clients may emit mixed results (empty/non-empty).
            // Don't finalize UI here; wait briefly for all results/judge outcome.
            if (!data.is_empty && !data.no_summary) {
                pendingSummaryText = (data.summary || '').trim();
            }

            awaitingJudgeDecision = true;
            showLoadingIndicator('Judging...', 'summarizing');

            if (summaryFinalizeTimer) {
                clearTimeout(summaryFinalizeTimer);
            }
            summaryFinalizeTimer = setTimeout(() => {
                // After waiting up to 5s for judge/playback, finalize fallback.
                if (awaitingJudgeDecision && summaryRequested && !summaryInProgress) {
                    summaryRequested = false;
                    awaitingJudgeDecision = false;
                    showSkippedIndicator('Summary not needed');
                    hideSummaryText();
                    pendingSummaryText = '';
                }
            }, 5000);
        });

        // TTS playback status from server
        socket.on('tts_playing', data => {
            summaryInProgress = true;
            summaryRequested = false;
            awaitingJudgeDecision = false;
            if (summaryFinalizeTimer) {
                clearTimeout(summaryFinalizeTimer);
                summaryFinalizeTimer = null;
            }
            // TTS is playing - hide summarizing indicator
            hideLoadingIndicator();
            if (pendingSummaryText) {
                showSummaryText(pendingSummaryText);
            }
        });

        socket.on('tts_done', () => {
            // TTS finished playing
            summaryInProgress = false;
            summaryRequested = false;
            awaitingJudgeDecision = false;
            if (summaryFinalizeTimer) {
                clearTimeout(summaryFinalizeTimer);
                summaryFinalizeTimer = null;
            }
            hideLoadingIndicator();
            hideSummaryText();
            pendingSummaryText = '';
        });

        socket.on('judge_rejected', data => {
            // Judge rejected playback: stop summarizing state immediately.
            summaryRequested = false;
            summaryInProgress = false;
            awaitingJudgeDecision = false;
            if (summaryFinalizeTimer) {
                clearTimeout(summaryFinalizeTimer);
                summaryFinalizeTimer = null;
            }
            hideLoadingIndicator();
            hideSummaryText();
            pendingSummaryText = '';
            showSkippedIndicator('Summary not needed');
        });

        // TTS audio playback with queue (play sequentially, no overlap)
        let ttsQueue = [];
        let ttsPlaying = false;
        let currentTtsAudio = null;
        let currentTtsUrl = null;

        function playNextTts() {
            if (ttsQueue.length === 0) {
                ttsPlaying = false;
                currentTtsAudio = null;
                currentTtsUrl = null;
                summaryInProgress = false;
                return;
            }

            ttsPlaying = true;
            summaryInProgress = true;
            const { audioData, url } = ttsQueue.shift();
            currentTtsUrl = url;

            const audio = new Audio(url);
            currentTtsAudio = audio;
            audio.play().catch(e => {
                console.error('TTS playback failed:', e);
                URL.revokeObjectURL(url);
                currentTtsAudio = null;
                currentTtsUrl = null;
                playNextTts();
            });

            audio.onended = () => {
                URL.revokeObjectURL(url);
                currentTtsAudio = null;
                currentTtsUrl = null;
                playNextTts();
            };
        }

        socket.on('summary_tts', data => {
            if (!data.audio) return;

            // Hide summarizing indicator when TTS audio arrives
            hideLoadingIndicator();
            summaryInProgress = true;

            // Decode base64 audio
            const audioData = atob(data.audio);
            const audioArray = new Uint8Array(audioData.length);
            for (let i = 0; i < audioData.length; i++) {
                audioArray[i] = audioData.charCodeAt(i);
            }

            const blob = new Blob([audioArray], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);

            // Add to queue
            ttsQueue.push({ audioData, url });

            // Start playing if not already
            if (!ttsPlaying) {
                playNextTts();
            }
        });

        socket.on('summary_tts_error', data => {
            console.error('TTS error:', data.error);
            summaryInProgress = false;
            summaryRequested = false;
            awaitingJudgeDecision = false;
            if (summaryFinalizeTimer) {
                clearTimeout(summaryFinalizeTimer);
                summaryFinalizeTimer = null;
            }
            hideLoadingIndicator();
            hideSummaryText();
            pendingSummaryText = '';
        });

        function cancelSummaryPlayback() {
            // Cancel server-side queued/playing TTS
            socket.emit('cancel_tts');

            // Cancel browser-side queued/playing TTS
            if (currentTtsAudio) {
                try {
                    currentTtsAudio.pause();
                    currentTtsAudio.currentTime = 0;
                } catch (e) {}
                currentTtsAudio = null;
            }
            if (currentTtsUrl) {
                try { URL.revokeObjectURL(currentTtsUrl); } catch (e) {}
                currentTtsUrl = null;
            }
            while (ttsQueue.length > 0) {
                const item = ttsQueue.shift();
                if (item && item.url) {
                    try { URL.revokeObjectURL(item.url); } catch (e) {}
                }
            }
            ttsPlaying = false;
            summaryRequested = false;
            summaryInProgress = false;
            awaitingJudgeDecision = false;
            if (summaryFinalizeTimer) {
                clearTimeout(summaryFinalizeTimer);
                summaryFinalizeTimer = null;
            }
            hideLoadingIndicator();
            hideSummaryText();
            pendingSummaryText = '';
            showSkippedIndicator('Summary canceled');
        }

        function render() {
            const list = document.getElementById('optionsList');
            if (options.length === 0) {
                list.innerHTML = '';
                return;
            }

            if (view === 'single') {
                // Single view: show only selected option
                const o = options[currentIdx];
                list.innerHTML = `
                    <div class="option-row">
                        <div class="keyword-box active">${o.word}</div>
                        <div class="desc-box active">${o.desc}</div>
                    </div>
                `;
            } else {
                // All view
                if (descView === 'all') {
                    // Show all keywords with their descriptions
                    list.innerHTML = options.map((o, i) => {
                        const isActive = i === currentIdx;
                        return `
                            <div class="option-row">
                                <div class="keyword-box ${isActive ? 'active' : ''}" onclick="selectKeyword(${i})">${o.word}</div>
                                <div class="desc-box ${isActive ? 'active' : ''}">${o.desc}</div>
                            </div>
                        `;
                    }).join('');
                } else {
                    // Show all keywords but only selected description
                    list.innerHTML = options.map((o, i) => {
                        const isActive = i === currentIdx;
                        return `
                            <div class="option-row">
                                <div class="keyword-box ${isActive ? 'active' : ''}" onclick="selectKeyword(${i})">${o.word}</div>
                                ${isActive ? `<div class="desc-box active">${o.desc}</div>` : ''}
                            </div>
                        `;
                    }).join('');
                }
            }
        }

        function selectKeyword(idx) {
            currentIdx = idx;
            render();
        }

        function hideInfo() {
            document.getElementById('optionsList').innerHTML = '';
            options = [];
            infoVisible = false;
        }

        function start(v) {
            view = v;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            // Stop mic level monitors when starting session
            stopAllMicMonitors();

            // Build start params with mic selections
            const params = { source: source };
            if (source === 'mic') {
                const kw = document.getElementById('keywordMic').value;
                const s1 = document.getElementById('summaryMic1').value;
                const s2 = document.getElementById('summaryMic2').value;
                const v1 = document.getElementById('voice1').value;
                const v2 = document.getElementById('voice2').value;
                params.keyword_mic = kw ? parseInt(kw) : null;
                params.summary_mics = [s1, s2].filter(x => x).map(x => parseInt(x));
                params.voice_ids = [v1, v2];
            }
            socket.emit('start', params);
        }

        function showLoadingIndicator(label = 'Searching', mode = 'inferring') {
            document.getElementById('tapDot1').style.display = 'none';
            document.getElementById('tapDot2').style.display = 'none';
            const indicator = document.getElementById('loadingIndicator');
            indicator.classList.remove('summarizing', 'skipped');
            if (mode === 'summarizing') {
                indicator.classList.add('summarizing');
            }
            document.querySelector('#loadingIndicator .label').textContent = label;
            indicator.classList.add('active');
        }

        function hideLoadingIndicator() {
            const indicator = document.getElementById('loadingIndicator');
            indicator.classList.remove('active', 'summarizing', 'skipped');
        }

        function showSkippedIndicator(message = 'Summary not needed') {
            const indicator = document.getElementById('loadingIndicator');
            indicator.classList.remove('summarizing');
            indicator.classList.add('active', 'skipped');
            document.querySelector('#loadingIndicator .label').textContent = message;
            // Auto-hide after 2 seconds
            setTimeout(() => {
                hideLoadingIndicator();
            }, 2000);
        }

        function showTapIndicator() {
            const dot1 = document.getElementById('tapDot1');
            const dot2 = document.getElementById('tapDot2');
            if (!dot1) return;
            // Restore display first
            dot1.style.display = '';
            dot2.style.display = '';
            dot1.classList.remove('show');
            dot2.classList.remove('show');
            void dot1.offsetWidth;
            dot1.classList.add('show');
        }

        function showDoubletapIndicator() {
            const dot1 = document.getElementById('tapDot1');
            const dot2 = document.getElementById('tapDot2');
            if (!dot1 || !dot2) return;
            // Restore display first
            dot1.style.display = '';
            dot2.style.display = '';
            dot1.classList.remove('show');
            dot2.classList.remove('show');
            void dot1.offsetWidth;
            dot1.classList.add('show');
            dot2.classList.add('show');
        }

        function hideSummary() {
            // Summary display removed
            if (summaryTimer) {
                clearTimeout(summaryTimer);
                summaryTimer = null;
            }
        }

        function showSummaryText(text) {
            if (!showSummaryTextEnabled || !text) return;
            const el = document.getElementById('summaryText');
            if (!el) return;
            el.textContent = `Summary: ${text}`;
            el.classList.add('active');
        }

        function hideSummaryText() {
            const el = document.getElementById('summaryText');
            if (!el) return;
            el.textContent = '';
            el.classList.remove('active');
        }

        let dismissTimer = null;
        function showDismissIndicator() {
            const el = document.getElementById('dismissIndicator');
            if (!el) return;
            if (dismissTimer) clearTimeout(dismissTimer);
            el.classList.remove('fade-out');
            el.classList.add('show');
            dismissTimer = setTimeout(() => {
                el.classList.add('fade-out');
                setTimeout(() => {
                    el.classList.remove('show', 'fade-out');
                }, 200);
            }, 1500);
        }

        function handleTap() {
            const now = Date.now();
            if (now - lastSpace < 300) {
                // Double tap
                if (summaryRequested || summaryInProgress) {
                    // During summary flow: double tap cancels playback/queue
                    cancelSummaryPlayback();
                    lastSpace = 0;
                    return;
                }
                if (infoVisible && options.length > 0) {
                    // Second double tap - dismiss keywords and request summary
                    showDismissIndicator();
                    dismissKeywords();
                } else {
                    // First double tap - start listening segment and request keywords
                    hideSummary();
                    socket.emit('start_listening');
                    socket.emit('request');
                    showLoadingIndicator('Inferring');
                }
                lastSpace = 0;
            } else {
                // Single tap - wait to see if double
                showTapIndicator();
                lastSpace = now;
                setTimeout(() => {
                    if (lastSpace !== 0 && Date.now() - lastSpace >= 280) {
                        if (options.length > 0) {
                            currentIdx = (currentIdx + 1) % options.length;
                            render();
                        }
                        lastSpace = 0;
                    }
                }, 300);
            }
        }

        function dismissKeywords() {
            // Clear keywords
            options = [];
            currentIdx = 0;
            infoVisible = false;
            document.getElementById('optionsList').innerHTML = '';

            // End listening segment and request summary if enabled
            if (dismissMode === 'summary') {
                summaryRequested = true;
                summaryInProgress = true;
                awaitingJudgeDecision = false;
                showLoadingIndicator('Summarizing...', 'summarizing');
                socket.emit('end_listening');
            }
        }

        document.addEventListener('keydown', e => {
            if (e.repeat) return;
            // Prevent default for all keys to avoid browser actions
            e.preventDefault();
        });

        document.addEventListener('keyup', e => {
            // Accept any key input
            handleTap();
        });

        // Right-click support
        document.addEventListener('contextmenu', e => {
            e.preventDefault(); // Prevent context menu
        });

        document.addEventListener('mouseup', e => {
            if (e.button !== 2) return; // Only right-click
            handleTap();
        });
    </script>
</body>
</html>
